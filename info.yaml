# Tiny Tapeout project metadata. Submission-shaped for the current template
# (yaml_version 6 — flat `ui[n]/uo[n]/uio[n]` pinout map, as precheck expects);
# not yet bound to a specific shuttle. The real submission gate is a green
# tt-gds-action run (decision D-004).
project:
  title: "TapeWright PWM"
  author: "George C"
  discord: ""
  description: "8-bit PWM peripheral — first TapeWright-driven Tiny Tapeout tile"
  language: "Verilog"
  clock_hz: 50000000
  tiles: "1x1"
  top_module: "tt_um_tapewright_pwm"
  source_files:
    - "tt_um_tapewright_pwm.v"

# The pinout. Use the same name as the IO pad on the chip, e.g. ui[0], uo[7].
pinout:
  # Inputs
  ui[0]: "duty[0]"
  ui[1]: "duty[1]"
  ui[2]: "duty[2]"
  ui[3]: "duty[3]"
  ui[4]: "duty[4]"
  ui[5]: "duty[5]"
  ui[6]: "duty[6]"
  ui[7]: "duty[7]"
  # Outputs
  uo[0]: "pwm_out"
  uo[1]: "counter[1]"
  uo[2]: "counter[2]"
  uo[3]: "counter[3]"
  uo[4]: "counter[4]"
  uo[5]: "counter[5]"
  uo[6]: "counter[6]"
  uo[7]: "counter[7]"
  # Bidirectional pins (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
