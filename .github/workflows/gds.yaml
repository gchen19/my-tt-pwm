name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: self-hosted
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build GDS
        uses: TinyTapeout/tt-gds-action@ttsky26c
        with:
          pdk: sky130A

  precheck:
    needs: gds
    # GitHub-hosted: precheck installs its own (single-user) nix, which conflicts
    # with this self-hosted machine's root-owned multi-user nix. gds/gl_test/viewer
    # stay on the local runner.
    runs-on: ubuntu-24.04
    steps:
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttsky26c

  gl_test:
    needs: gds
    runs-on: self-hosted
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: GL test
        uses: TinyTapeout/tt-gds-action/gl_test@ttsky26c

  viewer:
    needs: gds
    runs-on: self-hosted
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttsky26c
