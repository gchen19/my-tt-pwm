name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: self-hosted
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build GDS
        uses: TinyTapeout/tt-gds-action@ttsky26c
        with:
          pdk: sky130A

  precheck:
    needs: gds
    # Run on the local runner but inside a container that mirrors the GitHub-hosted
    # image (catthehacker/act). A fresh container has no pre-existing /nix so the nix
    # install works, and the act image ships the tools the action assumes (jq, git,
    # curl, sudo, ...) — bare ubuntu:24.04 lacks them. Keeps precheck on this machine.
    runs-on: self-hosted
    container: catthehacker/ubuntu:act-24.04
    steps:
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttsky26c
      # The container runs as root and writes root-owned files into the shared
      # self-hosted _work dir, which then breaks the host-side gds/gl_test checkout
      # on later runs. Restore ownership to the runner user (uid 1000) on exit.
      - name: Restore workspace ownership
        if: always()
        run: chown -R 1000:1000 "$GITHUB_WORKSPACE" || true

  gl_test:
    needs: gds
    runs-on: self-hosted
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: GL test
        uses: TinyTapeout/tt-gds-action/gl_test@ttsky26c

  viewer:
    needs: gds
    runs-on: self-hosted
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttsky26c
